name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Show Python + pip info
        run: |
          python --version
          pip --version
          python -m pip debug --verbose || true
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install dependencies (verbose)
        run: |
          python -m pip install --upgrade pip
          pip install -v -r requirements.txt
      - name: Run tests
        run: |
          mkdir -p reports
          echo "pwd: $(pwd)"
          echo "workspace: $GITHUB_WORKSPACE"
          echo "ls (root):"; ls -la
          echo "ls workspace:"; ls -la "$GITHUB_WORKSPACE"
          # Ensure PYTHONPATH points to the nested checkout folder (Actions checks out to $GITHUB_WORKSPACE/<repo>)
          export PYTHONPATH="$GITHUB_WORKSPACE/$(basename "$GITHUB_WORKSPACE")"
          echo "PYTHONPATH=$PYTHONPATH"
          # Save verbose pytest output and JUnit XML for debugging
          pytest -q --junitxml=reports/junit.xml | tee pytest.log
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            reports
            pytest.log

  integration:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    needs: test
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 2s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Start Celery worker
        env:
          CELERY_BROKER_URL: redis://localhost:6379/0
          CELERY_RESULT_BACKEND: redis://localhost:6379/0
        run: |
          # start a background worker for integration tests
          nohup celery -A app.celery_app.celery worker --loglevel=info &
          # wait briefly for worker to register
          sleep 3
      - name: Run integration tests (real Redis)
        env:
          CELERY_BROKER_URL: redis://localhost:6379/0
          CELERY_RESULT_BACKEND: redis://localhost:6379/0
        run: |
          echo "pwd: $(pwd)"
          echo "workspace: $GITHUB_WORKSPACE"
          export PYTHONPATH="$GITHUB_WORKSPACE/$(basename "$GITHUB_WORKSPACE")"
          echo "PYTHONPATH=$PYTHONPATH"
          pytest -q
